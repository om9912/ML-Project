
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Performance Predictor</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#667eea,#764ba2);
            overflow:hidden;
        }

        .container{
            text-align:center;
            color:white;
            max-width:800px;
            padding:40px;
        }

        .card{
            background:rgba(255,255,255,0.12);
            backdrop-filter:blur(15px);
            border:1px solid rgba(255,255,255,0.2);
            border-radius:25px;
            padding:50px;
            box-shadow:0 8px 32px rgba(0,0,0,0.25);
        }

        h1{
            font-size:3rem;
            margin-bottom:20px;
        }

        p{
            font-size:1.2rem;
            line-height:1.8;
            opacity:0.9;
            margin-bottom:35px;
        }

        .btn{
            display:inline-block;
            text-decoration:none;
            background:white;
            color:#4f46e5;
            padding:15px 35px;
            border-radius:12px;
            font-size:18px;
            font-weight:600;
            transition:0.3s ease;
        }

        .btn:hover{
            transform:translateY(-3px);
            box-shadow:0 10px 25px rgba(0,0,0,0.2);
        }

        .emoji{
            font-size:4rem;
            margin-bottom:15px;
        }

        @media(max-width:768px){
            h1{
                font-size:2rem;
            }

            p{
                font-size:1rem;
            }

            .card{
                padding:30px;
                margin:20px;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="card">

            <div class="emoji">🎓</div>

            <h1>Student Exam Performance Predictor</h1>

            <p>
                Predict your Mathematics score using Machine Learning.
                Enter student details, reading score, and writing score
                to get an instant prediction of expected Maths performance.
            </p>

            <a href="{{ url_for('predict_datapoint') }}" class="btn">
                Start Prediction →
            </a>

        </div>
    </div>

</body>
</html>
