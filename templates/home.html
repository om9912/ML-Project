
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Exam Performance Predictor</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#667eea,#764ba2);
            padding:30px;
        }

        .container{
            width:100%;
            max-width:700px;
        }

        .card{
            background:rgba(255,255,255,0.12);
            backdrop-filter:blur(15px);
            border:1px solid rgba(255,255,255,0.2);
            border-radius:20px;
            padding:35px;
            box-shadow:0 8px 32px rgba(0,0,0,0.2);
            color:white;
        }

        .title{
            text-align:center;
            margin-bottom:25px;
        }

        .title h1{
            font-size:2rem;
            margin-bottom:10px;
        }

        .title p{
            opacity:0.8;
        }

        .form-group{
            margin-bottom:18px;
        }

        label{
            display:block;
            margin-bottom:8px;
            font-weight:600;
        }

        .form-control{
            width:100%;
            padding:12px 15px;
            border:none;
            border-radius:12px;
            outline:none;
            font-size:15px;
            background:rgba(255,255,255,0.9);
        }

        .form-control:focus{
            box-shadow:0 0 0 3px rgba(102,126,234,0.4);
        }

        .btn{
            width:100%;
            padding:14px;
            border:none;
            border-radius:12px;
            background:#4f46e5;
            color:white;
            font-size:16px;
            font-weight:600;
            cursor:pointer;
            transition:0.3s ease;
        }

        .btn:hover{
            background:#4338ca;
            transform:translateY(-2px);
        }

        .result{
            margin-top:25px;
            text-align:center;
            padding:15px;
            border-radius:12px;
            background:rgba(255,255,255,0.15);
        }

        .result h2{
            font-size:1.4rem;
        }

        @media(max-width:768px){
            .card{
                padding:25px;
            }

            .title h1{
                font-size:1.6rem;
            }
        }
    </style>
</head>

<body>

<div class="container">
    <div class="card">

        <div class="title">
            <h1> Student Exam Performance Predictor</h1>
            <p>Predict your Mathematics Score based on academic details</p>
        </div>

        <form action="{{ url_for('predict_datapoint')}}" method="post">

            <div class="form-group">
                <label>Gender</label>
                <select class="form-control" name="gender" required>
                    <option selected disabled value="">Select Gender</option>
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                </select>
            </div>

            <div class="form-group">
                <label>Race or Ethnicity</label>
                <select class="form-control" name="ethnicity" required>
                    <option selected disabled value="">Select Ethnicity</option>
                    <option value="group A">Group A</option>
                    <option value="group B">Group B</option>
                    <option value="group C">Group C</option>
                    <option value="group D">Group D</option>
                    <option value="group E">Group E</option>
                </select>
            </div>

            <div class="form-group">
                <label>Parental Level of Education</label>
                <select class="form-control" name="parental_level_of_education" required>
                    <option selected disabled value="">Select Parent Education</option>
                    <option value="associate's degree">Associate's Degree</option>
                    <option value="bachelor's degree">Bachelor's Degree</option>
                    <option value="high school">High School</option>
                    <option value="master's degree">Master's Degree</option>
                    <option value="some college">Some College</option>
                    <option value="some high school">Some High School</option>
                </select>
            </div>

            <div class="form-group">
                <label>Lunch Type</label>
                <select class="form-control" name="lunch" required>
                    <option selected disabled value="">Select Lunch Type</option>
                    <option value="free/reduced">Free/Reduced</option>
                    <option value="standard">Standard</option>
                </select>
            </div>

            <div class="form-group">
                <label>Test Preparation Course</label>
                <select class="form-control" name="test_preparation_course" required>
                    <option selected disabled value="">Select Course Status</option>
                    <option value="none">None</option>
                    <option value="completed">Completed</option>
                </select>
            </div>

            <div class="form-group">
                <label>Writing Score (0-100)</label>
                <input class="form-control"
                       type="number"
                       name="reading_score"
                       placeholder="Enter Writing Score"
                       min="0"
                       max="100"
                       required>
            </div>

            <div class="form-group">
                <label>Reading Score (0-100)</label>
                <input class="form-control"
                       type="number"
                       name="writing_score"
                       placeholder="Enter Reading Score"
                       min="0"
                       max="100"
                       required>
            </div>

            <button class="btn" type="submit">
                Predict Maths Score
            </button>

        </form>

        {% if results %}
        <div class="result">
            <h2> Predicted Maths Score: {{ results }}</h2>
        </div>
        {% endif %}

    </div>
</div>

</body>
</html>
